server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Для SPA - все запросы, которые не являются API и не являются статическими файлами, отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статические файлы (js, css, изображения) - отдаем напрямую
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Прокси для API - используем имя сервиса из docker-compose.yml
    location /auth/ {
        proxy_pass http://app:8000/auth/;  # Изменено с host.docker.internal на app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Если есть другие API endpoints, добавьте их аналогично
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}