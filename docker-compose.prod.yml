services:
  db:
    image: postgres:15
    container_name: price_tracker_db
    restart: always
    env_file: [.env]
    environment:
      - TZ=Europe/Moscow
      - PGTZ=Europe/Moscow
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports: ["45432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  app:
    image: kartonkaton/price-tracker-app:latest
    container_name: price_app_service
    restart: always
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: [.env]
    environment:
      - DB_HOST=db
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/0
    command: >
      sh -c "cd src alembic upgrade head && python main.py"
    init: true

  celery_worker:
    image: kartonkaton/price-tracker-celery-worker:latest
    container_name: price_tracker_celery_worker
    restart: always
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: [.env]
    environment:
      - DB_HOST=db
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/0
    entrypoint: []
    command: python3 -m celery -A src.celery.app worker -l info -Q maintenance,notifications
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_parser:
    image: kartonkaton/price-tracker-celery-parser:latest
    container_name: price_tracker_celery_parser
    restart: always
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: [.env]
    environment:
      - DB_HOST=db
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/0
    entrypoint: []
    command: python3 -m celery -A src.celery.app worker -l info -Q parsing
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    image: kartonkaton/price-tracker-celery-beat:latest
    container_name: price_tracker_celery_beat
    restart: always
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    env_file: [.env]
    environment:
      - DB_HOST=db
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/0
    entrypoint: []
    command: python3 -m celery -A src.celery.app beat -l info
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: kartonkaton/price-tracker-frontend:latest
    container_name: price_tracker_frontend
    restart: always
    volumes:
      - ./frontend_nginx.conf:/etc/nginx/conf.d/default.conf:ro

  nginx:
    image: nginx:latest
    container_name: price_tracker_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /home/flyt_t1_1/projects/ddln/logs:/var/log/nginx
      - /home/flyt_t1_1/projects/ddln/stats:/var/log/nginx/stats:ro
      - /home/flyt_t1_1/prod/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app
      - frontend

  goaccess:
    image: allinurl/goaccess:latest
    container_name: price_tracker_goaccess
    restart: always
    volumes:
      - /home/flyt_t1_1/projects/ddln/logs:/opt/goaccess/logs:ro
      - /home/flyt_t1_1/projects/ddln/stats:/opt/goaccess/out
    entrypoint:
      - goaccess
      - /opt/goaccess/logs/access.log
      - --no-global-config
      - --log-format=COMBINED
      - --real-time-html
      - --ws-url=wss://tracker.glamourprice.ru/stats/ws
      - --port=7890
      - --output=/opt/goaccess/out/index.html

volumes:
  postgres_data:
