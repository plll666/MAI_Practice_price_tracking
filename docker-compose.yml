# // для локалки
services:
  db:
    image: postgres:15
    environment:
      - TZ=Europe/Moscow
      - PGTZ=Europe/Moscow
    container_name: price_tracker_db
    env_file:
      - .env
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
    container_name: price_app_service
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    working_dir: /app/src
    init: true
    ipc: host
    command: >
      sh -c "alembic upgrade head && python main.py"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "false"
    container_name: price_tracker_celery_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    working_dir: /app/src
    command: celery -A src.celery.app worker -l info -Q maintenance,notifications
    restart: always
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_parser:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
    container_name: price_tracker_celery_parser
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    working_dir: /app/src
    command: celery -A src.celery.app worker -l info -Q parsing
    restart: always
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "false"
    container_name: price_tracker_celery_beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    working_dir: /app/src
    command: celery -A src.celery.app beat -l info
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    container_name: price_tracker_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
    environment:
      VITE_API_URL: /api
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  postgres_data: